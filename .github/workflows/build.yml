name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-docx lxml pyinstaller
    
    - name: Build executable
      run: |
        pyinstaller --onefile --windowed --name "Simulink文档生成器" --clean main.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: simulink-doc-generator-windows
        path: dist/Simulink文档生成器.exe

  build-macos:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-docx lxml pyinstaller
    
    - name: Build executable
      run: |
        pyinstaller --onefile --windowed --name "Simulink文档生成器" --clean main.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: simulink-doc-generator-macos
        path: dist/Simulink文档生成器

  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    
    steps:
    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: simulink-doc-generator-windows
        path: ./dist
    
    - name: Download macOS artifact
      uses: actions/download-artifact@v4
      with:
        name: simulink-doc-generator-macos
        path: ./dist
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/Simulink文档生成器.exe
          dist/Simulink文档生成器
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}